services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - mealmate-data:/app/data
    environment:
      - DB_PATH=/app/data/mealmate.db
      - PORT=3000
    restart: unless-stopped

volumes:
  mealmate-data:
